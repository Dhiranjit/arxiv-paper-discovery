experiment:
  name: scibert_classification
  seed: 42

model:
  dropout_p: 0.1
  pretrained_name: allenai/scibert_scivocab_uncased

data:
  tokenized_dataset_dir: /kaggle/input/datasets/dhiranjitdaimary/arxiv-tokenized-dataset/
  group_to_index_path: group_to_index.json

optimizer:
  lr: 2.0e-05
  name: AdamW
  weight_decay: 0.01

scheduler:
  name: linear
  warmup_ratio: 0.1

training:
  accumulation_steps: 1
  batch_size: 32
  epochs: 3
  primary_metric: f1
  metric_mode: max

  # Classification threshold applied during validation and eval.
  # Tune this on the validation set after training if needed.
  threshold: 0.35

  # Set to null for full training, or a fraction (e.g., 0.1) for quick smoke-tests.
  sample_ratio: null

  # --- Checkpointing ---
  # Save best/ whenever primary_metric improves (model.pth + metrics.json + config.yaml).
  save_best_model: true
  # Overwrite last/ at the end of every epoch so training can always be resumed.
  save_last_checkpoint: false
  # Save an additional step-N/ every N optimiser steps. Set to null to disable.
  save_every_n_steps: 6000
  # How many step-N/ directories to keep on disk. Older ones are deleted automatically.
  keep_last_n_step_ckpts: 2

# ---------------------------------------------------------------------------
# Grid search (used by run_experiment.py only — ignored by run_training.py)
# ---------------------------------------------------------------------------
# List the values to try for each parameter using dotted keys.
# All combinations are run in sequence.
# Remove or leave empty to run run_experiment.py as a no-op.
sweep:
  optimizer.lr:    [1.0e-05, 3.0e-05, 4.0e-05, 1.0e-04]
  model.dropout_p: [0.1, 0.3, 0.5]
